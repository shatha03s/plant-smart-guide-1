services:
  - type: web
    name: plant-smart-guide-ai-rag
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ENABLE_OPENAI
        value: "1"
      - key: ENABLE_VISION
        value: "1"
